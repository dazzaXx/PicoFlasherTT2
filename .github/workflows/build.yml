name: Build PicoFlasherTT2

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install ARM GNU Toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential python3

    - name: Setup Raspberry Pi Pico SDK
      run: |
        # Clone the SDK into the runner's home directory
        git clone --depth 1 --branch master https://github.com/raspberrypi/pico-sdk.git $HOME/pico-sdk
        cd $HOME/pico-sdk
        # Initialize submodules (required for tinyusb)
        git submodule update --init
        # Globally export the SDK path so CMake can find it in later steps
        echo "PICO_SDK_PATH=$HOME/pico-sdk" >> $GITHUB_ENV

    - name: Copy SDK Import Script (Failsafe)
      run: |
        # Copies the required import script into the project root
        cp $HOME/pico-sdk/external/pico_sdk_import.cmake .

    - name: Configure CMake
      run: |
        # Create the build directory and configure the project
        cmake -S . -B build

    - name: Build Firmware
      run: |
        # Compile the project using all available CPU cores
        cmake --build build --parallel $(nproc)

    - name: Upload UF2 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PicoFlasher-Firmware
        path: build/*.uf2
        if-no-files-found: error
